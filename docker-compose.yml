services:
  postgres:
    image: postgres:16-alpine
    container_name: adegatv-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: adegatv
      POSTGRES_PASSWORD: adegatv123
      POSTGRES_DB: adegatv
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adegatv -d adegatv"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adegatv-network

  redis:
    image: redis:7-alpine
    container_name: adegatv-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adegatv-network

  minio:
    image: minio/minio:latest
    container_name: adegatv-minio
    restart: unless-stopped
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: adegatv
      MINIO_ROOT_PASSWORD: adegatv123
    command: server /data --console-address ":9001"
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - adegatv-network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: adegatv-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - api_uploads:/app/uploads
    ports:
      - "3001:3001"
    networks:
      - adegatv-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: adegatv-frontend
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env
    environment:
      - PORT=3002
    ports:
      - "3002:3002"
    networks:
      - adegatv-network

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: adegatv-admin
    restart: unless-stopped
    environment:
      - PORT=3003
    depends_on:
      - api
    env_file:
      - .env
    ports:
      - "3003:3003"
    networks:
      - adegatv-network

  player-web:
    build:
      context: ./apps/player-web
      dockerfile: Dockerfile
    container_name: adegatv-player-web
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env
    environment:
      - PORT=3004
    ports:
      - "3004:3004"
    networks:
      - adegatv-network

  video-worker:
    build:
      context: ./packages/video-worker
      dockerfile: Dockerfile
    container_name: adegatv-video-worker
    restart: unless-stopped
    depends_on:
      - redis
      - minio
    env_file:
      - .env
    volumes:
      - worker_uploads:/app/uploads
    networks:
      - adegatv-network

  stream-service:
    build:
      context: ./apps/stream-service
      dockerfile: Dockerfile
    container_name: adegatv-stream-service
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - API_URL=http://api:3001
      - STREAMS_DIR=/data/streams
    volumes:
      - stream_hls:/data/streams
    ports:
      - "3005:3005"
    networks:
      - adegatv-network

  nginx:
    image: nginx:alpine
    container_name: adegatv-nginx
    restart: unless-stopped
    depends_on:
      - api
      - frontend
      - admin
      - player-web
      - stream-service
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
      - "8443:443"
    networks:
      - adegatv-network

networks:
  adegatv-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  api_uploads:
  worker_uploads:
  stream_hls:
