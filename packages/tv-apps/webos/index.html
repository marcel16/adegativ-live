<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AdegaTV Live</title>
    <script>
        // webOS platform bridge
        window.webOSPlatform = {
            getDeviceId: function() {
                try { return webOS.deviceInfo('deviceId'); }
                catch(e) { return 'webos-' + Date.now(); }
            },
            exit: function() {
                try { window.close(); }
                catch(e) { webOS.platformBack(); }
            }
        };

        document.addEventListener('keydown', function(e) {
            var event = new CustomEvent('tv-keydown', {
                detail: { keyCode: e.keyCode, key: e.key }
            });
            window.dispatchEvent(event);
        });
    </script>
</head>
<body style="margin:0;overflow:hidden;background:#000;">
    <iframe id="player" src="http://YOUR_SERVER_IP:8080/player/pair"
            style="width:100%;height:100%;border:none;"
            allow="autoplay;fullscreen"></iframe>
    <script>
        // webOS fullscreen
        try {
            webOS.platformBack = window.webOSPlatform.exit;
        } catch(e) {}
    </script>
</body>
</html>
